[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, fully mocked, no external dependencies)
    integration: Integration tests (modules working together, some mocks)
    e2e: End-to-end tests (real Notion API calls, requires test database)

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (optional)
addopts = 
    -v
    --strict-markers
    --tb=short

